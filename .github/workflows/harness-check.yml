name: Harness Check

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  harness-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run harness checks
        run: python scripts/check_harness.py

      - name: Check decision memory review
        if: ${{ github.event_name == 'pull_request' }}
        run: python scripts/check_decision_memory.py --base "${{ github.event.pull_request.base.sha }}"
